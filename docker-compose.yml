version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    volumes:
      - .:/app
    env_file: .env
    command: sh -c "sleep 3 && alembic upgrade head"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.worker worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis
      - db  # Worker might need DB access for complex tasks later
    environment:
      - REDIS_URL=redis://redis:6379/0

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully  # Wait for migrations to finish
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --reload

volumes:
  postgres_data: